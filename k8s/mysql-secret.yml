# TODO (Task 8): Store MySQL credentials as a Kubernetes Secret.
#
# IMPORTANT: Never put credentials in a ConfigMap — ConfigMap values are stored
# as plain text and readable by anyone with kubectl access to the namespace.
# Secrets must be used for all sensitive values (passwords, tokens, keys).
#
# Required keys: username, password
# Namespace: retailpulse
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: mysql-credentials
#   namespace: retailpulse
# type: Opaque
# stringData:
#   username: retailpulse
#   password: retailpulse123
#
# Reference these in your Deployment/StatefulSet using secretKeyRef — never
# hardcode credentials as plain env values.
#
# Refer to Task 8 in the README for full usage examples.
