version: "3.9"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: retailpulse_db
      MYSQL_USER: retailpulse
      MYSQL_PASSWORD: retailpulse123
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "retailpulse", "-pretailpulse123"]
      interval: 10s
      timeout: 5s
      retries: 10

  retailpulse:
    build: .
    ports:
      - "8888:8888"
    environment:
      DB_HOST: mysql
      DB_USERNAME: retailpulse
      DB_PASSWORD: retailpulse123
      NOTIFICATION_FAILURE_RATE: 10
    depends_on:
      mysql:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - retailpulse

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    depends_on:
      - prometheus

volumes:
  mysql_data:
